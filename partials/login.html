<!-- Enterprise Phase 2-6 Sections — included in index.html -->

<!-- Login Overlay -->
<div id="loginOverlay" class="login-overlay">
  <div class="login-card card">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-truck-front-fill brand-icon fs-1"></i>
        <h4>Gitai Earthmovers</h4>
        <p class="text-muted small">Audit & Settlement System v2.0</p>
      </div>
      <form id="loginForm">
        <div class="mb-3"><label class="form-label">Username</label><input type="text" class="form-control" id="loginUsername" required autocomplete="username"></div>
        <div class="mb-3"><label class="form-label">Password</label><input type="password" class="form-control" id="loginPassword" required autocomplete="current-password"></div>
        <div id="loginError" class="text-danger small mb-2"></div>
        <button type="submit" class="btn btn-accent w-100">Sign In</button>
      </form>
      <p class="text-muted small mt-3 mb-0 text-center">Demo: admin / admin123</p>
    </div>
  </div>
</div>
